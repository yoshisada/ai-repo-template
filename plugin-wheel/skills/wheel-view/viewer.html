<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel Workflow Viewer</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2d3143;
    --text: #e4e7ef;
    --muted: #7a8194;
    --accent: #6c8cff;
    --accent-hover: #8aa3ff;
    --success: #4ade80;
    --warning: #fbbf24;
    --error: #f87171;
    --shadowed: #a78bfa;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'SF Mono', 'Fira Code', Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.6; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; }
  .header h1 { font-size: 1.25rem; font-weight: 600; }
  .header .meta { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  .container { display: flex; min-height: calc(100vh - 60px); }
  .sidebar { width: 280px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
  .sidebar-section { border-bottom: 1px solid var(--border); }
  .sidebar-section-title { padding: 12px 16px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); background: var(--surface); position: sticky; top: 0; z-index: 1; }
  .sidebar-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.875rem; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
  .sidebar-item:hover { background: rgba(255,255,255,0.03); }
  .sidebar-item.active { background: var(--surface); border-left: 3px solid var(--accent); }
  .sidebar-item .count { font-size: 0.7rem; color: var(--muted); background: var(--bg); padding: 2px 6px; border-radius: 4px; }
  .sidebar-item.error { color: var(--error); }
  .sidebar-item.shadowed { color: var(--shadowed); }
  .main { flex: 1; padding: 24px 32px; overflow-y: auto; }
  .welcome { color: var(--muted); font-size: 0.875rem; padding: 40px 0; text-align: center; }
  .workflow-header { margin-bottom: 20px; }
  .workflow-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
  .workflow-meta { font-size: 0.8rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .workflow-meta .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 500; }
  .badge-local { background: var(--accent); color: #fff; }
  .badge-plugin { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .badge-shadowed { background: var(--shadowed); color: #fff; }
  .section-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 24px 0 12px; }
  .step { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
  .step-header { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
  .step-header:hover { background: rgba(255,255,255,0.03); }
  .step-id { font-family: var(--mono); font-size: 0.8rem; font-weight: 500; }
  .step-type { font-size: 0.7rem; color: var(--muted); background: var(--bg); padding: 2px 8px; border-radius: 4px; margin-left: 8px; }
  .step-summary { font-size: 0.8rem; color: var(--muted); margin-left: auto; }
  .step-body { display: none; padding: 16px; border-top: 1px solid var(--border); }
  .step-body.open { display: block; }
  .step-field { margin-bottom: 12px; }
  .step-field:last-child { margin-bottom: 0; }
  .step-field-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 4px; }
  .step-field pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: var(--mono); font-size: 0.8rem; white-space: pre-wrap; word-break: break-word; max-height: 400px; overflow-y: auto; }
  .chevron { transition: transform 0.2s; font-size: 0.8rem; color: var(--muted); }
  .step.open .chevron { transform: rotate(90deg); }
  .empty-state { color: var(--muted); font-size: 0.875rem; padding: 20px; text-align: center; border: 1px dashed var(--border); border-radius: 8px; }
  .feedback-loop { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .loop-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .loop-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); }
  .loop-badge.kind { background: rgba(108, 140, 255, 0.15); border-color: var(--accent); color: var(--accent); }
  .mermaid-container { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin: 16px 0; overflow-x: auto; }
  .mermaid-error { color: var(--muted); font-size: 0.8rem; padding: 12px; background: var(--bg); border-radius: 6px; }
  .footer { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 24px; font-size: 0.7rem; color: var(--muted); display: flex; gap: 16px; }
  .footer span { margin-right: auto; }
  @media (max-width: 1023px) {
    .container { flex-direction: column; }
    .sidebar { width: 100%; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div class="header">
  <h1>Wheel Workflow Viewer</h1>
  <div class="meta" id="header-meta"></div>
</div>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-title">Local Workflows <span class="count" id="local-count">0</span></div>
      <div id="local-nav"><div class="empty-state">No local workflows</div></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">Plugin Workflows <span class="count" id="plugin-count">0</span></div>
      <div id="plugin-nav"><div class="empty-state">No plugin workflows</div></div>
    </div>
    <div id="feedback-sidebar-section"></div>
  </div>
  <div class="main">
    <div class="welcome" id="welcome">Select a workflow or feedback loop from the sidebar to view its details.</div>
    <div id="content"></div>
  </div>
</div>
<div class="footer">
  <span id="footer-stats"></span>
</div>
<script>
window.__WHEEL_VIEW_DATA__ = WHEEL_VIEW_DATA_PLACEHOLDER;

var localWorkflows = window.__WHEEL_VIEW_DATA__.local || [];
var pluginWorkflows = window.__WHEEL_VIEW_DATA__.plugin || [];
var feedbackLoops = window.__WHEEL_VIEW_DATA__.feedback || [];
var meta = window.__WHEEL_VIEW_DATA__.meta || {};

function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderWorkflowEntry(wf, section, index) {
  var shadowed = wf.localOverride ? ' shadowed' : '';
  var activeLabel = wf.localOverride ? ' (shadowed)' : '';
  return '<div class="sidebar-item' + shadowed + '" onclick="showWorkflow(' + index + ', \'' + section + '\')">' +
    '<span>' + escapeHtml(wf.name) + activeLabel + '</span>' +
    '<span class="count">' + (wf.stepCount || 0) + '</span></div>';
}

function renderFeedbackNav() {
  if (feedbackLoops.length === 0) return '';
  var html = '<div class="sidebar-section"><div class="sidebar-section-title">Feedback Loops <span class="count">' + feedbackLoops.length + '</span></div><div id="feedback-nav">';
  for (var i = 0; i < feedbackLoops.length; i++) {
    var name = feedbackLoops[i].name || feedbackLoops[i]._meta?.name || 'Untitled';
    html += '<div class="sidebar-item" onclick="showFeedbackLoop(' + i + ')"><span>' + escapeHtml(name) + '</span></div>';
  }
  html += '</div></div>';
  return html;
}

function showWorkflow(index, section) {
  document.querySelectorAll('.sidebar-item').forEach(function(el) { el.classList.remove('active'); });
  var items = section === 'local' ? document.getElementById('local-nav').children : document.getElementById('plugin-nav').children;
  if (items[index]) items[index].classList.add('active');
  var wf = section === 'local' ? localWorkflows[index] : pluginWorkflows[index];
  var badgeClass = wf.source === 'local' ? 'badge-local' : (wf.localOverride ? 'badge-shadowed' : 'badge-plugin');
  var badgeText = wf.source === 'local' ? 'Local' : 'Plugin: ' + wf.plugin;
  if (wf.localOverride) badgeText += ' (shadowed)';
  var html = '<div class="workflow-header"><div class="workflow-title">' + escapeHtml(wf.name) + '</div><div class="workflow-meta">';
  html += '<span class="badge ' + badgeClass + '">' + badgeText + '</span>';
  html += '<span>' + (wf.stepCount || 0) + ' steps</span>';
  html += '<span style="color:var(--muted);font-family:var(--mono)">' + escapeHtml(wf.path) + '</span>';
  if (wf.description) html += '<div style="margin-top:8px;color:var(--muted)">' + escapeHtml(wf.description) + '</div>';
  html += '</div></div>';
  html += '<div class="section-title">Steps</div>';
  if (!wf.steps || wf.steps.length === 0) {
    html += '<div class="empty-state">0 steps — workflow body is empty.</div>';
  } else {
    for (var i = 0; i < wf.steps.length; i++) {
      var step = wf.steps[i];
      var summary = step.type || '';
      if (step.prompt) summary += ' · prompt';
      else if (step.command) summary += ' · command';
      else if (step.agent) summary += ' · agent';
      html += '<div class="step" id="step-' + i + '"><div class="step-header" onclick="toggleStep(' + i + ')">' +
        '<span><span class="step-id">' + escapeHtml(step.id || '?') + '</span><span class="step-type">' + escapeHtml(step.type || '?') + '</span></span>' +
        '<span class="step-summary">' + escapeHtml(summary) + '</span><span class="chevron">&#9658;</span></div>' +
        '<div class="step-body" id="step-body-' + i + '"></div></div>';
    }
  }
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('content').innerHTML = html;
  window.currentSteps = wf.steps || [];
  window.currentContentType = 'workflow';
}

function showFeedbackLoop(index) {
  document.querySelectorAll('.sidebar-item').forEach(function(el) { el.classList.remove('active'); });
  var feedbackNavItems = document.getElementById('feedback-nav').children;
  if (feedbackNavItems[index]) feedbackNavItems[index].classList.add('active');
  var loop = feedbackLoops[index];
  var name = loop.name || loop._meta?.name || 'Untitled';
  var html = '<div class="workflow-header"><div class="workflow-title">' + escapeHtml(name) + '</div><div class="workflow-meta">';
  html += '<span class="badge badge-local">Feedback Loop</span>';
  if (loop._meta) {
    if (loop._meta.kind) html += '<span class="loop-badge kind">' + escapeHtml(loop._meta.kind) + '</span>';
    if (loop._meta.status) html += '<span class="loop-badge">' + escapeHtml(loop._meta.status) + '</span>';
    if (loop._meta.owner) html += '<span class="loop-badge">owner: ' + escapeHtml(loop._meta.owner) + '</span>';
    if (loop._meta.triggers && loop._meta.triggers.length) html += '<span class="loop-badge">triggers: ' + escapeHtml(loop._meta.triggers.join(', ')) + '</span>';
    if (loop._meta.metrics) html += '<span class="loop-badge">metrics: ' + escapeHtml(loop._meta.metrics) + '</span>';
  }
  html += '</div></div>';
  if (loop._meta && loop._meta.anti_patterns) {
    html += '<div style="margin:12px 0;font-size:0.8rem"><strong style="color:var(--muted)">Anti-patterns:</strong> ' + escapeHtml(loop._meta.anti_patterns.join('; ')) + '</div>';
  }
  if (loop._meta && loop._meta.related_loops) {
    html += '<div style="margin-bottom:12px;font-size:0.8rem"><strong style="color:var(--muted)">Related:</strong> ' + escapeHtml(loop._meta.related_loops.join(', ')) + '</div>';
  }
  html += '<div class="section-title">Mermaid Diagram</div>';
  if (loop._mermaid) {
    html += '<div class="mermaid-container"><div class="mermaid">' + escapeHtml(loop._mermaid) + '</div></div>';
  } else if (loop.steps && loop.steps.length) {
    html += '<div class="mermaid-error">Mermaid diagram not available. Ensure network access for CDN rendering, or generate with render-workflow.sh offline.</div>';
  }
  html += '<div class="section-title">Steps</div>';
  if (loop.steps && loop.steps.length) {
    for (var i = 0; i < loop.steps.length; i++) {
      var step = loop.steps[i];
      var doc = step._meta?.doc || step.doc || '';
      var actor = step._meta?.actor || step.actor || '';
      var stepId = step.id || step.name || ('Step ' + (i + 1));
      html += '<div class="step"><div class="step-header" onclick="toggleStep(' + i + ')">' +
        '<span><span class="step-id">' + escapeHtml(stepId) + '</span></span>' +
        '<span class="step-summary">' + escapeHtml(actor) + '</span><span class="chevron">&#9658;</span></div>' +
        '<div class="step-body" id="step-body-' + i + '">';
      if (doc) html += '<div class="step-field"><div class="step-field-label">Documentation</div><pre>' + escapeHtml(doc) + '</pre></div>';
      html += '</div></div>';
    }
    window.currentSteps = loop.steps;
  } else {
    html += '<div class="empty-state">No steps defined.</div>';
    window.currentSteps = [];
  }
  window.currentContentType = 'feedback';
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('content').innerHTML = html;
}

function toggleStep(i) {
  var stepEl = document.getElementById('step-' + i);
  var bodyEl = document.getElementById('step-body-' + i);
  var isOpen = stepEl.classList.contains('open');
  stepEl.classList.toggle('open');
  if (!isOpen && bodyEl.innerHTML === '') {
    var step = window.currentSteps ? window.currentSteps[i] : {};
    var html = '';
    var keys = ['description', 'prompt', 'command', 'agent', 'requires_plugins', 'model', 'inputs', 'output', 'if_zero', 'if_nonzero', 'context_from', 'on_error', 'skip'];
    for (var k = 0; k < keys.length; k++) {
      var key = keys[k];
      if (step[key] !== undefined && step[key] !== null && step[key] !== '') {
        var val = step[key];
        var display = Array.isArray(val) ? val.join(', ') : (typeof val === 'object' ? JSON.stringify(val, null, 2) : String(val));
        html += '<div class="step-field"><div class="step-field-label">' + key.replace(/_/g, ' ') + '</div><pre>' + escapeHtml(display) + '</pre></div>';
      }
    }
    bodyEl.innerHTML = html || '<div class="empty-state">No additional details.</div>';
  }
  bodyEl.classList.toggle('open', !isOpen);
}

function init() {
  document.getElementById('header-meta').textContent = 'Generated: ' + (meta.timestamp || new Date().toISOString()) + ' · wheel v' + (meta.version || '?');

  var localHtml = '';
  for (var i = 0; i < localWorkflows.length; i++) localHtml += renderWorkflowEntry(localWorkflows[i], 'local', i);
  document.getElementById('local-nav').innerHTML = localHtml || '<div class="empty-state">No local workflows</div>';

  var pluginHtml = '';
  for (var i = 0; i < pluginWorkflows.length; i++) pluginHtml += renderWorkflowEntry(pluginWorkflows[i], 'plugin', i);
  document.getElementById('plugin-nav').innerHTML = pluginHtml || '<div class="empty-state">No plugin workflows</div>';

  var feedbackHtml = renderFeedbackNav();
  document.getElementById('feedback-sidebar-section').innerHTML = feedbackHtml;

  var totalWf = localWorkflows.length + pluginWorkflows.length;
  document.getElementById('footer-stats').textContent = totalWf + ' workflow(s) · ' + feedbackLoops.length + ' feedback loop(s)';
  document.getElementById('local-count').textContent = localWorkflows.length;
  document.getElementById('plugin-count').textContent = pluginWorkflows.length;
}

if (typeof mermama !== 'undefined') mermama.initialize({ startOnLoad: true, theme: 'dark', flowchart: { useMaxWidth: true } });

init();
</script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js"></script>
<script>
if (typeof mermaid !== 'undefined') mermaid.initialize({ startOnLoad: true, theme: 'dark', flowchart: { useMaxWidth: true } });
else window.onload = function() { if (typeof mermaid !== 'undefined') mermaid.initialize({ startOnLoad: true, theme: 'dark', flowchart: { useMaxWidth: true } }); };
</script>
</body>
</html>
